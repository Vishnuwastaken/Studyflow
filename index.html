
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StudyFlow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
<style>
:root{
  --bg:#f5f7fb; --surface:#ffffff; --surface2:#eef3ff; --text:#16202a; --muted:#6d7888;
  --accent:#5f7cff; --accent2:#e8edff; --border:#dfe5f0; --success:#22a06b; --successbg:#e9fbf3;
  --warning:#d89a27; --danger:#d35656; --dangerbg:#fff0f0; --shadow:0 10px 30px rgba(20,32,50,.08);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f141b; --surface:#171d27; --surface2:#1f2940; --text:#edf3fb; --muted:#9ba9bb;
    --accent:#8399ff; --accent2:#1f2b49; --border:#2b3445; --success:#31b87f; --successbg:#152620;
    --warning:#dfaa41; --danger:#e06d6d; --dangerbg:#2d1717; --shadow:0 10px 30px rgba(0,0,0,.28);
  }
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}
.app{max-width:760px;margin:0 auto;min-height:100vh;padding-bottom:90px}
header{padding:18px 16px 8px}
.title{font-size:28px;font-weight:800;letter-spacing:-.03em}
.subtitle{font-size:13px;color:var(--muted);margin-top:4px}
main{padding:8px 14px}
.card,.panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow)}
.card{padding:16px;margin-bottom:14px}
.panel{padding:14px}
.h1{font-size:22px;font-weight:800;letter-spacing:-.03em}
.h2{font-size:18px;font-weight:750;letter-spacing:-.02em}
.h3{font-size:16px;font-weight:700}
.small{font-size:13px;color:var(--muted)}
.tiny{font-size:12px;color:var(--muted)}
.row{display:flex;gap:10px;align-items:center}
.row.wrap{flex-wrap:wrap}
.space{display:flex;justify-content:space-between;align-items:center;gap:10px}
.list{display:flex;flex-direction:column;gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media (max-width:560px){.grid2,.grid3{grid-template-columns:1fr}}
button,.btn{appearance:none;border:none;border-radius:14px;padding:13px 15px;font-size:15px;font-weight:700;cursor:pointer;transition:transform .08s ease, opacity .15s ease}
button:active,.btn:active{transform:scale(.99)}
.btn{width:100%;background:var(--accent);color:#fff}
.btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn.success{background:var(--success);color:#fff}
.btn.warning{background:var(--warning);color:#fff}
.btn.danger{background:var(--danger);color:#fff}
.btn.inline{width:auto}
input,textarea,select{width:100%;padding:13px 14px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:15px}
textarea{min-height:100px;resize:vertical}
.progress{height:10px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;overflow:hidden}
.progress>div{height:100%;background:var(--accent)}
.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:var(--surface2);border:1px solid var(--border);font-size:12px;color:var(--muted)}
.badge{display:inline-flex;padding:6px 9px;border-radius:999px;background:var(--accent2);color:var(--accent);font-size:12px;font-weight:700}
.empty{text-align:center;padding:24px 14px;border:1px dashed var(--border);border-radius:18px;color:var(--muted)}
.flashcard{min-height:280px;padding:24px;border-radius:24px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;text-align:center;background:linear-gradient(180deg,var(--surface),color-mix(in srgb, var(--surface) 84%, var(--accent2)));box-shadow:var(--shadow);font-size:24px;font-weight:800;letter-spacing:-.03em;line-height:1.25}
.flashcard.flipped{background:linear-gradient(180deg,var(--surface),color-mix(in srgb, var(--surface) 84%, var(--successbg)))}
.nav{position:fixed;left:0;right:0;bottom:0;padding:10px 12px 14px;background:linear-gradient(180deg,transparent,color-mix(in srgb,var(--bg) 88%, transparent) 30%,var(--bg))}
.nav-inner{max-width:760px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px;border-radius:20px;background:color-mix(in srgb,var(--surface) 92%, transparent);border:1px solid var(--border);box-shadow:var(--shadow);backdrop-filter:blur(14px)}
.nav button{background:transparent;color:var(--muted)}
.nav button.active{background:var(--accent2);color:var(--accent)}
.toast{position:fixed;left:50%;bottom:94px;transform:translateX(-50%);padding:11px 14px;border-radius:14px;background:var(--text);color:var(--bg);box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.18s;z-index:50}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.reward{display:inline-flex;padding:9px 12px;border-radius:12px;background:var(--accent2);color:var(--accent);font-weight:800}
.quiz-option.correct{background:var(--successbg)!important;color:var(--text)!important;border:2px solid var(--success)!important}
.quiz-option.wrong{background:var(--dangerbg)!important;color:var(--text)!important;border:2px solid var(--danger)!important}
.pet-wrap{display:flex;align-items:center;justify-content:center}
.pet{position:relative;width:86px;height:86px}
.pet.big{width:170px;height:170px}
.pet-body{position:absolute;left:50%;top:50%;transform:translate(-50%,-45%);width:64px;height:56px;border-radius:50% 50% 42% 42%;background:var(--pet-color,#8cc8ff);border:2px solid #526377}
.pet.big .pet-body{width:118px;height:104px;border-width:3px}
.ear{position:absolute;width:15px;height:18px;background:var(--pet-color,#8cc8ff);border:2px solid #526377;border-radius:60% 60% 20% 20%;top:14px}
.ear.left{left:18px;transform:rotate(-18deg)} .ear.right{right:18px;transform:rotate(18deg)}
.pet.big .ear{width:28px;height:34px;top:28px;border-width:3px}.pet.big .ear.left{left:34px}.pet.big .ear.right{right:34px}
.eye{position:absolute;width:5px;height:6px;background:#1b2635;border-radius:50%;top:39px}
.eye.left{left:34px}.eye.right{right:34px}
.pet.big .eye{width:10px;height:12px;top:73px}.pet.big .eye.left{left:63px}.pet.big .eye.right{right:63px}
.mouth{position:absolute;left:50%;top:49px;transform:translateX(-50%);width:14px;height:7px;border-bottom:2px solid #1b2635;border-radius:0 0 18px 18px}
.pet.big .mouth{top:92px;width:26px;height:12px;border-bottom-width:3px}
.hat{position:absolute;left:50%;top:8px;transform:translateX(-50%);width:34px;height:10px;background:#f3c95e;border-radius:12px 12px 6px 6px;border:2px solid #996f1b}
.hat:after{content:'';position:absolute;left:50%;transform:translateX(-50%);top:-10px;width:18px;height:12px;background:#f3c95e;border:2px solid #996f1b;border-bottom:none;border-radius:12px 12px 0 0}
.pet.big .hat{width:66px;height:20px;top:14px;border-width:3px}.pet.big .hat:after{width:36px;height:24px;top:-20px;border-width:3px}
.glasses{position:absolute;left:50%;top:35px;transform:translateX(-50%);width:38px;height:10px}
.glasses:before,.glasses:after{content:'';position:absolute;width:12px;height:9px;border:2px solid #526377;border-radius:4px;top:0}
.glasses:before{left:4px}.glasses:after{right:4px}
.glasses i{position:absolute;left:50%;top:4px;transform:translateX(-50%);width:6px;height:2px;background:#526377}
.pet.big .glasses{top:68px;width:74px;height:18px}.pet.big .glasses:before,.pet.big .glasses:after{width:24px;height:18px;border-width:3px;border-radius:8px}.pet.big .glasses i{top:7px;width:12px;height:3px}
.file-chip{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:11px 12px;border-radius:14px;background:var(--surface2);border:1px solid var(--border)}
.icon{width:34px;height:34px;border-radius:10px;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:18px}
.kpi{padding:10px;border-radius:14px;border:1px solid var(--border);background:var(--surface2)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="title">StudyFlow</div>
    <div class="subtitle">Study first. Gentle motivation built in.</div>
  </header>
  <main id="app"></main>
</div>
<div class="nav">
  <div class="nav-inner">
    <button id="nav-home" onclick="navigate('home')">Home</button>
    <button id="nav-decks" onclick="navigate('decks')">Decks</button>
    <button id="nav-study" onclick="navigate('study')">Study</button>
    <button id="nav-pet" onclick="navigate('pet')">Pet</button>
  </div>
</div>
<div id="toast" class="toast"></div>

<script type="module" src="./src/app.js"></script>

</body>
</html>
